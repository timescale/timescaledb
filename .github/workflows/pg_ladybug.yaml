name: pg_ladybug
"on":
  pull_request:
  push:
    branches:
      - main
      - prerelease_test
jobs:
  pg_ladybug:
    runs-on: ubuntu-latest
    env:
      CC: clang-19

    steps:

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get purge llvm-16 clang-16
        sudo apt-get install llvm-19 llvm-19-dev clang-19 libclang-19-dev libcurl4-openssl-dev postgresql-server-dev-16

    - name: Checkout timescaledb
      uses: actions/checkout@v4

    - name: Checkout pg_ladybug
      uses: actions/checkout@v4
      with:
        repository: 'svenklemm/pg_ladybug'
        path: 'pg_ladybug'

    - name: build pg_ladybug
      run:  |
        cd pg_ladybug
        cmake -S . -B build
        make -C build

    - name: Configure timescaledb
      run: |
        ./bootstrap -DCMAKE_BUILD_TYPE=Debug -DLINTER=ON -DCLANG_TIDY_EXTRA_OPTS=",-*,postgres-*;--load=$HOME/work/timescaledb/timescaledb/pg_ladybug/build/lib/libPostgresCheck.so"

    - name: Build timescaledb
      run: |
        make -C build VERBOSE=1
